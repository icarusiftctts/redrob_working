# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Antigravityr"


ai_usage_summary: |
  Used Gemini for code refinement, bug fixing (e.g. yoe_multiplier index fix),
  optimizing candidate feature definitions (e.g. core skills expansion), setting up the
  coarse-to-fine filtering pipeline, and structuring the rule-based reasoning engine templates.
  No candidate data was fed to external APIs. 
  Used Antigravity as the IDE for code completion, documentation.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A two-stage candidate ranking system for a Senior AI Engineer role. Stage 1 utilizes a fast 
  6-feature coarse filter (combining core skill matching, SBERT, BM25, current/average title 
  relevancy, and consulting history) to narrow the 100K candidate space to the top 5000. 
  Stage 2 applies a complete 22-feature scoring model with additive behavioral adjustments 
  (profile completeness, recency, notice period, activity levels, and trust signals) and 
  multiplicative modifiers for years of experience, location (relocation/India preference), 
  and expected salary matching (25-55 LPA target). The system filters out synthetic 
  honeypots using 4 programmatic red flags. High-ranking candidates are explained using 
  an evidence-grounded, multi-template reasoning engine. CPU runtime is ~10-12 seconds.

